<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>درجات الكيمياء</title>

<style>
body{
    font-family: Arial,sans-serif;
    background:#f2f2f2;
    text-align:center;
    padding:30px;
}
.container{
    max-width:600px;
    margin:auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}
h1{
    color:green;
}
input{
    width:90%;
    padding:15px;
    font-size:22px;
    text-align:center;
}
button{
    margin-top:15px;
    padding:15px 30px;
    font-size:22px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}
#result{
    margin-top:25px;
    font-size:22px;
}
</style>
</head>
<body>

<div class="container">
<h1>درجات الكيمياء</h1>

<p>أدخل الكود الخاص بك</p>

<input id="code" placeholder="اكتب الكود هنا">

<br>

<button onclick="searchStudent()">
عرض النتيجة
</button>

<div id="result"></div>
</div>

<script>

const students = {

""K8X41P": {name:"نور صباح", daily1:8, daily2:10},
"T2M93Q": {name:"لمياء حسن احمد", daily1:8, daily2:7},
"R7A15Z": {name:"مريم احمد", daily1:8, daily2:9},
"M4K82N": {name:"لينا ربيع سالم", daily1:4, daily2:4},
"G9T61Q": {name:"غصون طارق", daily1:9, daily2:"م"},
"L5Y73W": {name:"الاء ياسر", daily1:6, daily2:10},
"B2X94R": {name:"رسل محمود", daily1:5, daily2:10},
"J8N46P": {name:"موج محمود", daily1:7, daily2:9},
"Q3V27K": {name:"ايمان محمود علي", daily1:5, daily2:9},
"F6C81M": {name:"كفاح ندون", daily1:7, daily2:8},
"H7D52L": {name:"اسماء دريد", daily1:8, daily2:10},
"U9P14S": {name:"فاطمة علي", daily1:8, daily2:7},
"E4R68T": {name:"سدره سفيان ابراهيم", daily1:8, daily2:10},
"Z1W35Y": {name:"امنة محمد عيدان", daily1:8, daily2:10},
"R7Z84T": {name:"روان تكليف", daily1:0, daily2:8},
"M7H28Q": {name:"مها وضاح", daily1:0, daily2:9},
"R6W41K": {name:"روعه محمد فتحي", daily1:0, daily2:8},

function searchStudent(){

let code = document.getElementById("code").value.trim().toUpperCase();

let result = document.getElementById("result");

if(students[code]){
    result.innerHTML =
    "<h2>" + students[code].name + "</h2>" +
    "<p>اليومي الأول: " + students[code].daily1 + "</p>" +
    "<p>اليومي الثاني: " + students[code].daily2 + "</p>";
}else{
    result.innerHTML =
    "<span style='color:red'>الكود غير صحيح</span>";
}

}

</script>

</body>
</html>
